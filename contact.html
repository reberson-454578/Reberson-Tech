    <main>
        <h2>Contato</h2>
        <form id="contact-form" action="/send-email" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label for="name">Nome:</label>
                <i class="fas fa-user"></i>
                <input type="text" id="name" name="name" placeholder="Digite seu nome completo" required>
            </div>
            <div class="form-group">
                <label for="email">Email: </label>
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" name="_replyto" placeholder="Digite seu email" required>
            </div>
            <div class="form-group">
                <label for="message">Mensagem: </label>
                <textarea id="message" name="message" placeholder="Escreva sua mensagem aqui" required></textarea>
            </div>
            <div class="form-group">
                <label for="file">Anexar Arquivo:</label>
                <input type="file" id="file" name="file" required>
            </div>
            <button type="submit">Enviar</button>
            <div id="message-box" style="display: none;"></div>
        </form>
    </main>
